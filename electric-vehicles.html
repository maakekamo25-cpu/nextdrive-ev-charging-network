<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NextDrive EV</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#06142b;
    color:white;
}

.hero{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(135deg,#001f4d,#0088ff);
}

.hero h1{
    font-size:42px;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:15px 30px;
    background:#00ff88;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}

.vehicle-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.vehicle-card{
    background:#0f2347;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.vehicle-card img{
    width:100%;
    border-radius:10px;
}

section{
    padding:40px 20px;
}

</style>
</head>

<body>
